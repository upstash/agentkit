name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 (pinned via packageManager) requires Node >=22.13; use 24 LTS.
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint + prettier)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build packages
        run: pnpm build

      - name: Test
        # Tests run against a real Upstash Redis. Add UPSTASH_REDIS_REST_URL /
        # UPSTASH_REDIS_REST_TOKEN as repo secrets to enable them; without secrets the
        # Redis-backed suites skip themselves and CI stays green.
        run: pnpm test
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Build example app
        run: pnpm --filter agentkit-demo build
