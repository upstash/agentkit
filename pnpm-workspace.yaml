packages:
  - "packages/*"
  - "examples/*"
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
# The whole repo is on AI SDK v7-beta; don't gate beta installs by release age.
minimumReleaseAge: 0

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@rolldown/*"
  - "@vercel/*"
  - "@workflow/*"
  - ai
  - experimental-ai-sdk-code-mode
  - eve
  - nitro
  - rolldown
  - workflow
